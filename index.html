<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gwhyyy Portfolio</title>
</head>
<body>
    <h1>Gwhyyy</h1>
    
    <hr>
    
    <section id="about">
        <h2>Who I Am</h2>
        <p id="aboutText"></p>
    </section>
    
    <hr>
    
    <section id="skills">
        <h2>My Skills - If You Want Me to Build Something for You</h2>
        <p>Looking for a specific skill? Search here to see if I can help:</p>
        <input 
            type="text" 
            id="skillSearch" 
            placeholder="Type to search skills..." 
            oninput="filterSkills()"
        >
        <br><br>
        <ul id="skillsList"></ul>
    </section>
    
    <hr>
    
    <section id="portfolio">
        <h2>Portfolio</h2>
        <ul id="portfolioList"></ul>
    </section>
    
    <hr>
    
    <section id="contact">
        <h2>Contact</h2>
        <ul id="contactList"></ul>
    </section>
    
    <hr>
    
    <section id="socials">
        <h2>Social Media</h2>
        <ul id="socialsList"></ul>
    </section>
    
    <hr>
    
    <footer>
        <p>&copy; 2025 Gwhyyy. All rights reserved.</p>
    </footer>

    <script>
        // ============================================
        // CONFIGURATION - CUSTOMIZED FOR ANAS FIKHI
        // ============================================

        // About Me Text
        const aboutMe = "Flutter developer from Morocco. Building open-source tools and micro-SaaS products.";

        const skills = [
          {
            name: "Flutter",
            description: "Cross-platform development with high-performance UI, clean architecture (MVC/MVVM), animations, state management (Provider, Riverpod, BLoC), and scalable mobile design."
          },
          {
            name: "Dart",
            description: "Asynchronous programming, isolates, package development, protocol implementations, API integrations, and architectural patterns for maintainable code."
          },
              {
                name: "Open Source Development",
                description: "Creator and maintainer of public Dart/Flutter packages including Nostr clients, AI SDKs, relay tools, and internal utilities used by developers worldwide."
              },          {
                name: "SDK development",
                description: "Building and maintaining SDKs for Flutter and Dart, including Nostr clients, AI integrations, and utility packages."
              },
          {
            name: "Nostr",
            description: "Low-level event models, relays, NIPs implementation, decentralized identity, signing, pub/sub systems, and building production-ready decentralized features."
          },
          {
            name: "REST APIs (creation & integration)",
            description: "Designing, integrating, and optimizing APIs across mobile and backend systems with robust error handling and secure communication."
          },
          {
            name: "Linux",
            description: "Daily-driver productivity environment: CLI workflows, system optimization, scripting, package management, debugging, and environment tooling."
          },
          {
            name: "Git & GitHub",
            description: "Version control best practices, semantic commits, contribution workflows, branching strategies, issue tracking, and open-source maintenance."
          },

                      {
            name: "Cloud Platforms",
            description: "Experience with cloud platforms (AWS, GCP) for deploying and scaling applications. Knowledge of cloud services (compute, storage, databases) and infrastructure as code."
          },
          {
            name: "Problem Solving",
            description: "Breaking down complex technical challenges, optimizing architectures, and designing efficient, scalable engineering solutions."
          },
          {
            name: "Micro-SaaS",
            description: "Ideation, MVP development, product validation, iterative building, and mindset shaped toward creating tools that solve real problems."
          }
        ];


        // Portfolio Projects (GitHub badges will show real-time stars automatically)
        const portfolio = [
          {
            title: "flutter_nostr",
            description: "A full-featured Flutter SDK for building Nostr-powered social apps: timelines, chat, identity, relay management, event subscriptions, and more.",
            link: "https://github.com/anasfik/flutter_nostr"
          },
          {
            title: "dart_nostr",
            description: "Core Dart/Flutter Nostr client toolkit with key management, relay handling, event creation, and support for many NIPs. Used as the foundation for decentralized apps.",
            link: "https://github.com/anasfik/nostr"
          },
          {
            title: "OpenAI Dart / Flutter SDK",
            description: "A Dart package for integrating OpenAI APIs (GPT, DALL-E, Whisper, etc.) into Flutter or server-side Dart apps. Makes it easy to build AI-powered apps.",
            link: "https://github.com/anasfik/openai"
          },
          {
            title: "nostr_relay_management",
            description: "A Dart package implementing NIP-86 (Relay Management API) to help developers manage relay lists, query relay metadata, and build smarter relay UIs.",
            link: "https://github.com/anasfik/nostr_relay_management"
          },
          {
            title: "flutter-spy",
            description: "A reverse-engineering tool to analyze Flutter apps. It helps inspect and extract insights and structure from compiled Flutter applications.",
            link: "https://github.com/anasfik/flutter-spy"
          },
          {
            title: "Gwhyyy Android Apps",
            description: "Android applications published under the 'Gwhyyy' brand on Google Play. Includes utility and productivity apps that reflect my design and development style.",
            link: "https://play.google.com/store/apps/developer?id=Gwhyyy&hl=en"
          }
        ];

        // Contact Information
        const contact = [
            { label: "Email", value: "work@gwhyyy.com" },
            { label: "Location", value: "Morocco" }
        ];

        // Social Media Links
        const socials = [
            { name: "GitHub", url: "https://github.com/anasfik" },
        ];

        // ============================================
        // RENDERING FUNCTIONS - NO NEED TO EDIT BELOW
        // ============================================
        
        // Render About Me
        function renderAbout() {
            document.getElementById('aboutText').textContent = aboutMe;
        }
        
        // Render Skills
        function renderSkills() {
            const skillsList = document.getElementById('skillsList');
            skillsList.innerHTML = '';
            
            skills.forEach(function(skill) {
                const li = document.createElement('li');
                li.className = 'skill-item';
                li.textContent = skill.name;
                li.setAttribute('title', skill.description);
                li.setAttribute('data-name', skill.name.toLowerCase());
                li.setAttribute('data-description', skill.description.toLowerCase());
                
                skillsList.appendChild(li);
            });
        }
        
        // Render Portfolio
        function renderPortfolio() {
            const portfolioList = document.getElementById('portfolioList');
            portfolioList.innerHTML = '';
            
            portfolio.forEach(function(project) {
                const li = document.createElement('li');
                
                const title = document.createElement('h3');
                title.textContent = project.title + ' ';
                
                if (project.link && project.link.includes('github.com')) {
                    const githubMatch = project.link.match(/github\.com\/([^\/]+)\/([^\/]+)/);
                    if (githubMatch) {
                        const username = githubMatch[1];
                        const repo = githubMatch[2];
                        const badgeUrl = 'https://img.shields.io/github/stars/' + username + '/' + repo;
                        
                        const badge = document.createElement('img');
                        badge.src = badgeUrl;
                        badge.alt = 'GitHub stars';
                        title.appendChild(badge);
                    }
                }
                
                const description = document.createElement('p');
                description.textContent = project.description;
                
                li.appendChild(title);
                li.appendChild(description);
                
                if (project.link) {
                    const link = document.createElement('a');
                    link.href = project.link;
                    link.textContent = "View Project";
                    link.target = "_blank";
                    li.appendChild(link);
                }
                
                portfolioList.appendChild(li);
            });
        }
        
        // Render Contact
        function renderContact() {
            const contactList = document.getElementById('contactList');
            contactList.innerHTML = '';
            
            contact.forEach(function(item) {
                const li = document.createElement('li');
                const strong = document.createElement('strong');
                strong.textContent = item.label + ': ';
                li.appendChild(strong);
                
                if (item.label === 'Email') {
                    const emailLink = document.createElement('a');
                    emailLink.href = 'mailto:' + item.value;
                    emailLink.textContent = item.value;
                    li.appendChild(emailLink);
                } else {
                    li.appendChild(document.createTextNode(item.value));
                }
                
                contactList.appendChild(li);
            });
        }
        
        // Render Social Media
        function renderSocials() {
            const socialsList = document.getElementById('socialsList');
            socialsList.innerHTML = '';
            
            socials.forEach(function(social) {
                const li = document.createElement('li');
                const link = document.createElement('a');
                link.href = social.url;
                link.textContent = social.name;
                link.target = "_blank";
                li.appendChild(link);
                socialsList.appendChild(li);
            });
        }
        
        // Filter Skills Function (searches both name and description)
        function filterSkills() {
            const searchInput = document.getElementById('skillSearch');
            const searchTerm = searchInput.value.toLowerCase();
            const skillItems = document.querySelectorAll('.skill-item');
            
            skillItems.forEach(function(item) {
                const skillName = item.getAttribute('data-name');
                const skillDesc = item.getAttribute('data-description');
                
                if (skillName.includes(searchTerm) || skillDesc.includes(searchTerm)) {
                    item.style.display = '';
                } else {
                    item.style.display = 'none';
                }
            });
        }
        
        // Initialize Page - Render All Sections
        function init() {
            renderAbout();
            renderSkills();
            renderPortfolio();
            renderContact();
            renderSocials();
        }
        
        // Run initialization when page loads
        init();
    </script>
</body>
</html>
