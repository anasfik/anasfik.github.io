<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
</head>
<body>
    <h1>Portfolio</h1>
    
    <hr>
    
    <section id="about">
        <h2>About Me</h2>
        <p id="aboutText"></p>
    </section>
    
    <hr>
    
    <section id="skills">
        <h2>My Skills - If You Want Me to Build Something for You</h2>
        <p>Looking for a specific skill? Search here to see if I can help:</p>
        <input 
            type="text" 
            id="skillSearch" 
            placeholder="Type to search skills..." 
            oninput="filterSkills()"
        >
        <br><br>
        <ul id="skillsList"></ul>
    </section>
    
    <hr>
    
    <section id="portfolio">
        <h2>Portfolio</h2>
        <ul id="portfolioList"></ul>
    </section>
    
    <hr>
    
    <section id="contact">
        <h2>Contact</h2>
        <ul id="contactList"></ul>
    </section>
    
    <hr>
    
    <section id="socials">
        <h2>Social Media</h2>
        <ul id="socialsList"></ul>
    </section>
    
    <hr>
    
    <footer>
        <p>&copy; 2025 My Portfolio. All rights reserved.</p>
    </footer>

    <script>
        // ============================================
        // CONFIGURATION - EDIT YOUR DATA HERE
        // ============================================
        
        // About Me Text
        const aboutMe = "Hello! I'm a passionate developer with experience in building web applications and solving complex problems. I enjoy working with modern technologies and constantly learning new skills to improve my craft.";
        
        // Skills List
        const skills = [
            "JavaScript",
            "HTML",
            "Python",
            "React",
            "Node.js",
            "Git",
            "SQL",
            "REST APIs",
            "TypeScript",
            "Express.js",
            "MongoDB",
            "PostgreSQL",
            "Docker",
            "AWS",
            "Linux"
        ];
        
        // Portfolio Projects (add link field for each project)
        const portfolio = [
            {
                title: "E-commerce Platform",
                description: "A full-stack online shopping platform with user authentication, product catalog, and payment integration.",
                link: "https://github.com/username/ecommerce-platform"
            },
            {
                title: "Task Management App",
                description: "A collaborative task tracking application with real-time updates and team collaboration features.",
                link: "https://github.com/username/task-manager"
            },
            {
                title: "Weather Dashboard",
                description: "An interactive weather application that displays current conditions and forecasts using third-party APIs.",
                link: "https://github.com/username/weather-dashboard"
            },
            {
                title: "Portfolio Website Generator",
                description: "A tool that helps developers create customizable portfolio websites with various templates.",
                link: "https://github.com/username/portfolio-generator"
            }
        ];
        
        // Contact Information
        const contact = [
            { label: "Email", value: "contact@example.com" },
            { label: "Phone", value: "+1 (555) 123-4567" },
            { label: "Location", value: "San Francisco, CA" }
        ];
        
        // Social Media Links
        const socials = [
            { name: "GitHub", url: "https://github.com/username" },
            { name: "LinkedIn", url: "https://linkedin.com/in/username" },
            { name: "Twitter", url: "https://twitter.com/username" },
            { name: "Dev.to", url: "https://dev.to/username" }
        ];
        
        // ============================================
        // RENDERING FUNCTIONS - NO NEED TO EDIT BELOW
        // ============================================
        
        // Render About Me
        function renderAbout() {
            document.getElementById('aboutText').textContent = aboutMe;
        }
        
        // Render Skills
        function renderSkills() {
            const skillsList = document.getElementById('skillsList');
            skillsList.innerHTML = '';
            
            skills.forEach(function(skill) {
                const li = document.createElement('li');
                li.className = 'skill-item';
                li.textContent = skill;
                skillsList.appendChild(li);
            });
        }
        
        // Render Portfolio
        function renderPortfolio() {
            const portfolioList = document.getElementById('portfolioList');
            portfolioList.innerHTML = '';
            
            portfolio.forEach(function(project) {
                const li = document.createElement('li');
                
                const title = document.createElement('h3');
                title.textContent = project.title;
                
                const description = document.createElement('p');
                description.textContent = project.description;
                
                li.appendChild(title);
                li.appendChild(description);
                
                if (project.link) {
                    const link = document.createElement('a');
                    link.href = project.link;
                    link.textContent = "View Project";
                    link.target = "_blank";
                    li.appendChild(link);
                }
                
                portfolioList.appendChild(li);
            });
        }
        
        // Render Contact
        function renderContact() {
            const contactList = document.getElementById('contactList');
            contactList.innerHTML = '';
            
            contact.forEach(function(item) {
                const li = document.createElement('li');
                const strong = document.createElement('strong');
                strong.textContent = item.label + ': ';
                li.appendChild(strong);
                
                if (item.label === 'Email') {
                    const emailLink = document.createElement('a');
                    emailLink.href = 'mailto:' + item.value;
                    emailLink.textContent = item.value;
                    li.appendChild(emailLink);
                } else {
                    li.appendChild(document.createTextNode(item.value));
                }
                
                contactList.appendChild(li);
            });
        }
        
        // Render Social Media
        function renderSocials() {
            const socialsList = document.getElementById('socialsList');
            socialsList.innerHTML = '';
            
            socials.forEach(function(social) {
                const li = document.createElement('li');
                const link = document.createElement('a');
                link.href = social.url;
                link.textContent = social.name;
                link.target = "_blank";
                li.appendChild(link);
                socialsList.appendChild(li);
            });
        }
        
        // Filter Skills Function
        function filterSkills() {
            const searchInput = document.getElementById('skillSearch');
            const searchTerm = searchInput.value.toLowerCase();
            const skillItems = document.querySelectorAll('.skill-item');
            
            skillItems.forEach(function(item) {
                const skillText = item.textContent.toLowerCase();
                
                if (skillText.includes(searchTerm)) {
                    item.style.display = '';
                } else {
                    item.style.display = 'none';
                }
            });
        }
        
        // Initialize Page - Render All Sections
        function init() {
            renderAbout();
            renderSkills();
            renderPortfolio();
            renderContact();
            renderSocials();
        }
        
        // Run initialization when page loads
        init();
    </script>
</body>
</html>
